<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工账</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c2b20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="工账">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="工程收入 · 人情往来 · 家庭存钱">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{
  --ink:#1c2b20; --ink-80:#2d3f32; --ink-20:rgba(28,43,32,.12);
  --copper:#b07d4a; --copper-lt:#f5ede1; --copper-dk:#8a6035;
  --sage:#4a7055; --sage-lt:#eaf2eb; --sage-dk:#2d4f38;
  --cream:#f7f4ef; --white:#fff; --muted:#8a9a8d; --border:rgba(28,43,32,.1);
  --danger:#b83c2b; --danger-lt:#fdf0ee;
  --amber:#c07a10; --amber-lt:#fef5e4;
  --blue:#2a5f8f; --blue-lt:#e8f1fb;
  --shadow-sm:0 1px 4px rgba(28,43,32,.06),0 2px 8px rgba(28,43,32,.04);
  --shadow-md:0 2px 8px rgba(28,43,32,.08),0 4px 16px rgba(28,43,32,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;max-width:480px;margin:0 auto}

/* ── HEADER ── */
.app-header{background:var(--ink);padding:16px 14px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(28,43,32,.35)}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:12px}
.brand-name{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;font-size:24px;color:#fff;letter-spacing:8px;line-height:1}
.brand-row{display:flex;align-items:center;gap:8px}
.brand-dot{width:5px;height:5px;background:var(--copper);border-radius:50%;margin-bottom:3px;flex-shrink:0}
.brand-sub{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;font-weight:300}
.hdr-actions{display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:11px;padding:5px 9px;border-radius:7px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:background .15s;white-space:nowrap}
.hdr-btn:active{background:rgba(255,255,255,.14)}
.module-tabs{display:flex;border-top:1px solid rgba(255,255,255,.06)}
.module-tab{flex:1;padding:9px 0;text-align:center;color:rgba(255,255,255,.32);font-size:12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px}
.module-tab.active{color:#fff;border-bottom-color:var(--copper);font-weight:500}

/* ── SUB TABS ── */
.sub-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:89px;z-index:40}
.sub-tab{flex:1;padding:8px 0;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.sub-tab.active{color:var(--ink);border-bottom-color:var(--copper);font-weight:500}

/* ── STATS ── */
.stats-row{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{flex:1;padding:9px 4px;text-align:center;border-right:1px solid var(--border);min-width:0}
.stat:last-child{border-right:none}
.stat-val{font-size:13px;font-weight:700;font-family:'Noto Serif SC',serif;white-space:nowrap}
.stat-label{font-size:9px;color:var(--muted);margin-top:1px;letter-spacing:.3px}
/* 纯利润强调行 */
.profit-hero{background:linear-gradient(135deg,var(--sage-dk),var(--sage));padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.profit-hero-left{color:rgba(255,255,255,.75);font-size:12px;letter-spacing:.5px}
.profit-hero-left span{display:block;font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.profit-hero-amount{font-size:26px;font-weight:700;font-family:'Noto Serif SC',serif;color:#fff;letter-spacing:1px}
.profit-hero-unit{font-size:13px;font-weight:400;opacity:.7;margin-right:2px}

/* ── OVERVIEW CARD (钱袋) ── */
.overview-card{background:var(--ink-80);border-radius:12px;margin:10px 10px 0;padding:16px;color:#fff;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.overview-card::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(176,125,74,.12);border-radius:50%}
.overview-card::after{content:'';position:absolute;right:20px;bottom:-30px;width:80px;height:80px;background:rgba(74,112,85,.15);border-radius:50%}
.ov-label{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:1px;margin-bottom:6px}
.ov-amount{font-size:28px;font-weight:700;font-family:'Noto Serif SC',serif;letter-spacing:1px;margin-bottom:12px}
.ov-row{display:flex;gap:12px}
.ov-item{flex:1;background:rgba(255,255,255,.07);border-radius:8px;padding:8px 10px;border:1px solid rgba(255,255,255,.08)}
.ov-item-val{font-size:14px;font-weight:600;font-family:'Noto Serif SC',serif}
.ov-item-label{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

/* ── CONTENT ── */
.content{padding:10px 10px 90px}

/* ── CARDS ── */
.record-card{background:var(--white);border-radius:var(--r-md, 12px);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow-sm);animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.record-main{display:flex;align-items:center;padding:11px 12px;cursor:pointer;gap:10px}
.record-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;font-weight:700}
.record-info{flex:1;min-width:0}
.record-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.record-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-right{flex-shrink:0;text-align:right}
.record-amount{font-size:17px;font-weight:700;font-family:'Noto Serif SC',serif}
.record-status{font-size:10px;margin-top:2px}
.tag{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:400;flex-shrink:0}
.badge-unpaid{background:var(--danger-lt);color:var(--danger);font-size:9px;padding:2px 6px;border-radius:20px;font-weight:500}
.badge-savings{background:var(--sage-lt);color:var(--sage);font-size:9px;padding:2px 6px;border-radius:20px;font-weight:500}

/* ── DETAIL ── */
.record-detail{display:none;padding:0 12px 10px;border-top:1px dashed var(--border);background:#fafaf8}
.record-detail.open{display:block}
.detail-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--ink-20)}
.detail-row:last-of-type{border-bottom:none}
.detail-row span:first-child{color:var(--muted)}
.detail-profit{background:linear-gradient(135deg,var(--sage-lt),#d8eeda);border-radius:9px;padding:9px 11px;margin:6px 0 4px}
.detail-profit-title{font-size:11px;color:var(--sage-dk);font-weight:600;margin-bottom:5px;letter-spacing:.5px}
.detail-profit-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:var(--ink-80)}
.detail-profit-net{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--sage-dk);margin-top:5px;padding-top:5px;border-top:1px solid rgba(74,112,85,.2)}
.detail-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.btn-action{flex:1;padding:8px 6px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;border:1px solid;white-space:nowrap;min-width:60px;font-weight:500;letter-spacing:.3px;transition:opacity .15s}
.btn-action:active{opacity:.7}
.btn-del{background:var(--danger-lt);color:var(--danger);border-color:rgba(184,60,43,.2)}
.btn-share{background:var(--sage-lt);color:var(--sage-dk);border-color:rgba(74,112,85,.2)}
.btn-paid{background:var(--blue-lt);color:var(--blue);border-color:rgba(42,95,143,.2)}
.btn-edit{background:#f5f0e8;color:var(--copper-dk);border-color:rgba(176,125,74,.25)}

/* ── FAB ── */
.fab{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);max-width:460px;width:calc(100% - 20px);background:var(--ink);color:#fff;border:none;border-radius:28px;padding:13px;font-size:14px;font-family:'Noto Sans SC',sans-serif;letter-spacing:3px;cursor:pointer;box-shadow:0 4px 20px rgba(28,43,32,.35),0 2px 6px rgba(28,43,32,.2);z-index:100;transition:transform .15s;font-weight:500}
.fab:active{transform:translateX(-50%) scale(.97)}
.fab-accent{color:var(--copper);margin-right:4px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,43,32,.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:16px 14px 30px;animation:slideUp .22s ease;max-height:93vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal h2{font-family:'Noto Serif SC',serif;font-size:16px;text-align:center;margin-bottom:14px;letter-spacing:1px}
.form-group{margin-bottom:11px}
.form-label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.3px}
.form-input,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);background:#fafaf8;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus{border-color:var(--copper);background:var(--white)}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.type-toggle{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;background:#fafaf8}
.type-btn{flex:1;padding:9px;text-align:center;font-size:13px;cursor:pointer;border:none;background:transparent;font-family:'Noto Sans SC',sans-serif;color:var(--muted);transition:all .2s;font-weight:400}
.type-btn.t-income{background:var(--sage);color:#fff;font-weight:500}
.type-btn.t-expense{background:var(--copper-dk);color:#fff;font-weight:500}
.type-btn.t-savings{background:var(--blue);color:#fff;font-weight:500}
.section-title{font-size:11px;color:var(--muted);margin:12px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--border);letter-spacing:.5px;font-weight:500}
.profit-preview{font-size:11px;color:var(--sage-dk);font-weight:600;text-align:right;margin-top:3px;min-height:16px}
.submit-btn{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:11px;font-size:14px;letter-spacing:3px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;margin-top:6px;font-weight:500;box-shadow:0 3px 12px rgba(28,43,32,.25);transition:opacity .15s}
.submit-btn:active{opacity:.85}
.close-btn{display:block;text-align:center;color:var(--muted);font-size:13px;margin-top:10px;cursor:pointer;padding:4px}

/* ── DATE PICKER ── */
.date-display{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);background:#fafaf8;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s}
.date-display:active{border-color:var(--copper)}
.date-popup{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;background:var(--white);border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(28,43,32,.18);z-index:500;padding:16px 14px 28px}
.date-popup.open{display:block}
.dp-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dp-nav{background:none;border:none;font-size:22px;cursor:pointer;padding:2px 12px;color:var(--ink);opacity:.5;transition:opacity .2s}
.dp-nav:active{opacity:1}
.dp-title{font-size:15px;font-weight:600;font-family:'Noto Serif SC',serif;letter-spacing:1px}
.dp-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--muted);margin-bottom:4px}
.dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-day{text-align:center;padding:9px 2px;font-size:13px;border-radius:8px;cursor:pointer;transition:background .15s}
.dp-day:active{background:#f0f0ee}
.dp-day.today{color:var(--copper);font-weight:600}
.dp-day.selected{background:var(--ink);color:#fff;font-weight:600}
.dp-day.other-month{color:#d0d0cc}
.dp-close{margin-top:12px;width:100%;padding:10px;background:var(--cream);border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;color:var(--muted)}

/* ── CALCULATOR ── */
.calc-wrap{background:#f5f3ef;border-radius:9px;border:1px solid var(--border);overflow:hidden;margin-top:4px}
.calc-display-sub{padding:4px 10px 0;font-size:10px;color:var(--muted);text-align:right;min-height:16px}
.calc-display{padding:4px 10px 6px;font-size:20px;font-weight:600;text-align:right;color:var(--ink);font-family:'Noto Serif SC',serif;word-break:break-all;min-height:34px}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.calc-btn{padding:12px 4px;text-align:center;font-size:14px;cursor:pointer;background:var(--white);border:none;font-family:'Noto Sans SC',sans-serif;color:var(--ink);transition:background .1s;font-weight:400}
.calc-btn:active{background:#f0f0ee}
.calc-btn.op{color:var(--copper-dk);font-weight:500}
.calc-btn.eq{background:var(--ink);color:#fff;font-weight:600}
.calc-btn.eq:active{background:var(--ink-80)}
.calc-btn.clr{color:var(--danger);font-weight:500}
.calc-use{width:100%;padding:9px;background:var(--sage-lt);border:none;font-size:12px;color:var(--sage-dk);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;letter-spacing:.5px;transition:background .15s}
.calc-use:active{background:#d4ecd6}

/* ── SUMMARY ── */
.summary-card{background:var(--white);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;padding:13px;box-shadow:var(--shadow-sm)}
.sc-name{font-size:15px;font-weight:500}
.sc-sub{font-size:11px;color:var(--muted);margin-top:1px;margin-bottom:8px}
.sc-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px}
.sc-bar-label{width:28px;color:var(--muted);font-size:10px}
.sc-bar-bg{flex:1;height:5px;background:var(--ink-20);border-radius:3px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.sc-bar-val{width:58px;text-align:right;font-weight:600;font-size:11px}
.sc-net{margin-top:7px;padding-top:7px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;font-size:12px}

/* ── WALLET OVERVIEW ── */
.wallet-hero{background:var(--ink);border-radius:12px;margin:10px 10px 0;padding:16px;color:#fff;box-shadow:var(--shadow-md);overflow:hidden;position:relative}
.wallet-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(176,125,74,.15),transparent 70%)}
.wh-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1.5px;margin-bottom:4px}
.wh-amount{font-size:30px;font-weight:700;font-family:'Noto Serif SC',serif;letter-spacing:1px;margin-bottom:14px}
.wh-amount span{font-size:16px;font-weight:400;margin-right:2px;opacity:.7}
.wh-row{display:flex;gap:8px}
.wh-item{flex:1;background:rgba(255,255,255,.07);border-radius:8px;padding:8px;border:1px solid rgba(255,255,255,.07)}
.wh-item-val{font-size:13px;font-weight:600;font-family:'Noto Serif SC',serif}
.wh-item-label{font-size:9px;color:rgba(255,255,255,.38);margin-top:2px;letter-spacing:.5px}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.6}
.empty p{font-size:13px;line-height:2}

/* ── TOAST ── */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(28,43,32,.92);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;letter-spacing:.3px}
.toast.show{opacity:1}

/* ── BACKUP BANNER ── */
.backup-banner{background:linear-gradient(135deg,var(--amber-lt),#fcefd4);border:1px solid rgba(192,122,16,.25);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px}
.backup-banner-text{flex:1;line-height:1.5;color:var(--ink-80)}
.backup-banner-btn{background:var(--amber);color:#fff;border:none;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;font-weight:500}

/* ── WORK DAY CALENDAR ── */
.wdc-wrap{background:#f5f3ef;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:4px}
.wdc-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);background:#eeeae4}
.wdc-nav{background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--ink);opacity:.45;line-height:1;transition:opacity .15s}
.wdc-nav:active{opacity:1}
.wdc-month{font-size:13px;font-weight:600;font-family:'Noto Serif SC',serif;letter-spacing:.5px}
.wdc-wk{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;color:var(--muted);padding:5px 4px 2px}
.wdc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 4px 4px}
.wdc-cell{text-align:center;border-radius:7px;cursor:pointer;overflow:hidden;transition:background .12s;min-height:38px;display:flex;flex-direction:column;justify-content:center}
.wdc-cell:active{opacity:.7}
.wdc-cell.other-m{opacity:.25;pointer-events:none}
.wdc-cell.is-today .wdc-d{color:var(--copper);font-weight:600}
.wdc-cell.is-worked{background:var(--blue)}
.wdc-cell.is-worked .wdc-d{color:#fff}
.wdc-cell.is-worked .wdc-h{color:rgba(255,255,255,.8)}
.wdc-d{font-size:12px;line-height:1.4;padding:3px 0 0}
.wdc-h{font-size:9px;font-weight:600;color:var(--blue);line-height:1.4;padding-bottom:3px}
/* 输入小时数的行内条 */
.wdc-input-bar{display:none;align-items:center;gap:7px;padding:8px 10px;background:var(--blue-lt);border-top:1px solid rgba(42,95,143,.15)}
.wdc-input-bar.show{display:flex}
.wdc-input-bar label{font-size:12px;color:var(--blue);font-weight:500;white-space:nowrap;flex-shrink:0}
.wdc-input-bar input{flex:1;padding:6px 10px;border:1.5px solid rgba(42,95,143,.3);border-radius:7px;font-size:14px;font-family:'Noto Sans SC',sans-serif;outline:none;background:#fff;color:var(--ink);min-width:0;width:60px}
.wdc-input-bar input:focus{border-color:var(--blue)}
.wdc-confirm{padding:6px 12px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;transition:opacity .15s}
.wdc-confirm:active{opacity:.75}
.wdc-remove{padding:6px 10px;background:var(--danger-lt);color:var(--danger);border:1px solid rgba(184,60,43,.2);border-radius:7px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
.wdc-summary{padding:6px 10px 7px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);background:#eeeae4}
.wdc-sum-lbl{font-size:11px;color:var(--muted)}
.wdc-sum-val{font-size:12px;font-weight:600;color:var(--blue)}
/* 工时日明细展示 */
.wd-detail-box{background:var(--blue-lt);border-radius:9px;padding:9px 11px;margin:7px 0 4px;border:1px solid rgba(42,95,143,.12)}
.wd-detail-title{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:6px}
.wd-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.wd-pill{background:var(--blue);color:#fff;border-radius:6px;padding:3px 7px;font-size:11px;line-height:1.4}
.wd-total{font-size:12px;color:var(--blue);font-weight:600;display:flex;justify-content:space-between;padding-top:5px;border-top:1px solid rgba(42,95,143,.15)}

/* ── PWA 启动屏（等字体加载）── */

.splash-name{font-size:42px;color:#fff;letter-spacing:12px;margin-bottom:8px}
.splash-dot{width:6px;height:6px;background:#b07d4a;border-radius:50%;margin:0 auto 12px}

</style>
</head>
<body>
<!-- 启动画面 -->
<div id="splash">
  <div class="splash-name" style="font-family:serif">工账</div>
  <div class="splash-dot"></div>
  <div class="splash-sub">工程 · 往来 · 家计</div>
</div>

<div class="app-header">
  <div class="header-top">
    <div>
      <div class="brand-row">
        <div class="brand-name">工账</div>
        <div class="brand-dot"></div>
      </div>
      <div class="brand-sub">工程 · 往来 · 家计</div>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="doBackup()">备份</button>
      <button class="hdr-btn" onclick="document.getElementById('imp').click()">恢复</button>
    </div>
  </div>
  <div class="module-tabs">
    <div class="module-tab active" id="mt-ex" onclick="switchModule('ex')">🚜 工程收入</div>
    <div class="module-tab" id="mt-rq" onclick="switchModule('rq')">🤝 人情往来</div>
    <div class="module-tab" id="mt-wt" onclick="switchModule('wt')">💰 存钱记账</div>
  </div>
</div>

<div class="sub-tabs" id="sub-tabs"></div>
<div id="profit-hero-bar"></div>
<div class="stats-row" id="stats-row"></div>
<div class="content" id="content"></div>
<button class="fab" id="fab" onclick="openModal()"><span class="fab-accent">＋</span> 记一笔</button>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-inner"></div>
</div>

<div class="date-popup" id="date-popup">
  <div class="dp-handle"></div>
  <div class="dp-header">
    <button class="dp-nav" onclick="dpPrev()">‹</button>
    <span class="dp-title" id="dp-title"></span>
    <button class="dp-nav" onclick="dpNext()">›</button>
  </div>
  <div class="dp-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
  <div class="dp-days" id="dp-days"></div>
  <button class="dp-close" onclick="closeDp()">取消</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">

<script>
// ════════════════════════════════
//  DATA
// ════════════════════════════════
const SK = 'gongzhang_v1', BK = 'gz_backup_ts';
let db = loadDB();
let mod = 'ex', sub = 'all';
let _paid = false, _rqType = 'out', _wtType = 'expense';
const calcState = {};

function loadDB() {
  try {
    const r = localStorage.getItem(SK);
    if (r) {
      const d = JSON.parse(r);
      d.excavator = d.excavator||[]; d.renqing = d.renqing||[]; d.wallet = d.wallet||[];
      return d;
    }
  } catch(e){}
  return {excavator:[], renqing:[], wallet:[]};
}
function saveDB() {
  try { localStorage.setItem(SK, JSON.stringify(db)); }
  catch(e){ showToast('⚠️ 存储已满，请立即备份！'); }
}
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmt(n) { return '¥' + Number(n||0).toLocaleString('zh-CN'); }
function showToast(msg, ms=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}
function needsBackup() {
  const last = parseInt(localStorage.getItem(BK)||'0');
  return (Date.now()-last)/864e5>7 && (db.excavator.length+db.renqing.length+db.wallet.length)>0;
}
function markBackup() { localStorage.setItem(BK, Date.now()); }

// ════════════════════════════════
//  WORK-DAY CALENDAR STATE
//  wdcDays = { "2026-02-03": 8, "2026-02-04": 6.5, ... }
// ════════════════════════════════
let wdcDays = {};       // 当前工程已选工作日 {dateStr: hours}
let wdcY = 0, wdcM = 0; // 日历显示月份
let wdcPicking = null;  // 当前点击的日期（等待输入小时）

function wdcInit(existing) {
  wdcDays = existing ? JSON.parse(JSON.stringify(existing)) : {};
  const now = new Date();
  wdcY = now.getFullYear(); wdcM = now.getMonth();
  wdcPicking = null;
}

function wdcRender() {
  const box = document.getElementById('wdc-box');
  if(!box) return;
  const CN_M2 = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const first = new Date(wdcY, wdcM, 1).getDay();
  const total = new Date(wdcY, wdcM+1, 0).getDate();
  const td    = todayStr();
  const totalHrs  = Object.values(wdcDays).reduce((s,h)=>s+h, 0);
  const workedDays = Object.keys(wdcDays).length;

  let cells = '';
  for(let i=0;i<first;i++) cells += '<div class="wdc-cell other-m"><div class="wdc-d"></div></div>';
  for(let d=1;d<=total;d++) {
    const ds  = `${wdcY}-${String(wdcM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hrs = wdcDays[ds];
    const worked  = hrs !== undefined;
    const isToday = ds === td;
    cells += `<div class="wdc-cell ${worked?'is-worked':''} ${isToday?'is-today':''}" onclick="wdcTap('${ds}')">
      <div class="wdc-d">${d}</div>
      <div class="wdc-h">${worked ? hrs+'h' : ''}</div>
    </div>`;
  }

  // 输入条 HTML
  const pickingDate = wdcPicking;
  const inputBar = pickingDate ? (() => {
    const [,pm,pd] = pickingDate.split('-');
    const existing = wdcDays[pickingDate];
    return `<div class="wdc-input-bar show" id="wdc-input-bar">
      <label>${parseInt(pm)}月${parseInt(pd)}日&nbsp;干了几小时？</label>
      <input type="number" id="wdc-hrs" placeholder="8" min="0.5" max="24" step="0.5" value="${existing||8}" autofocus>
      <button class="wdc-confirm" onclick="wdcConfirm()">确认</button>
      ${existing !== undefined ? `<button class="wdc-remove" onclick="wdcRemove()">删除</button>` : ''}
    </div>`;
  })() : '<div class="wdc-input-bar" id="wdc-input-bar"></div>';

  box.innerHTML = `<div class="wdc-wrap">
    <div class="wdc-hdr">
      <button class="wdc-nav" onclick="wdcMove(-1)">‹</button>
      <span class="wdc-month">${wdcY}年${CN_M2[wdcM]}</span>
      <button class="wdc-nav" onclick="wdcMove(1)">›</button>
    </div>
    <div class="wdc-wk"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="wdc-grid">${cells}</div>
    ${inputBar}
    <div class="wdc-summary">
      <span class="wdc-sum-lbl">已选 ${workedDays} 天</span>
      <span class="wdc-sum-val">合计 ${totalHrs} 小时</span>
    </div>
  </div>`;

  // 渲染完聚焦输入框
  if(pickingDate) {
    setTimeout(() => {
      const inp = document.getElementById('wdc-hrs');
      if(inp) { inp.focus(); inp.select(); }
    }, 30);
  }

  // 更新总额计算
  wdcUpdateTotal();
}

function wdcMove(dir) {
  wdcM += dir;
  if(wdcM > 11){ wdcM=0; wdcY++; }
  if(wdcM < 0) { wdcM=11; wdcY--; }
  wdcPicking = null;
  wdcRender();
}

function wdcTap(ds) {
  wdcPicking = ds;
  wdcRender();
}

function wdcConfirm() {
  const inp = document.getElementById('wdc-hrs');
  const hrs = parseFloat(inp?.value) || 0;
  if(hrs > 0) wdcDays[wdcPicking] = hrs;
  else delete wdcDays[wdcPicking];
  wdcPicking = null;
  wdcRender();
}

function wdcRemove() {
  delete wdcDays[wdcPicking];
  wdcPicking = null;
  wdcRender();
}

function wdcUpdateTotal() {
  const rate     = parseFloat(document.getElementById('ex-rate')?.value) || 0;
  const totalHrs = Object.values(wdcDays).reduce((s,h)=>s+h, 0);
  const total    = Math.round(totalHrs * rate);
  const hintEl   = document.getElementById('hourly-hint');
  const amtEl    = document.getElementById('ex-amount');
  if(hintEl) {
    const days = Object.keys(wdcDays).length;
    hintEl.textContent = days > 0
      ? `${days}天 · 共${totalHrs}小时 × ¥${rate}/时 = ¥${total.toLocaleString('zh-CN')}`
      : rate > 0 ? '点日历选择工作日，自动算总额' : '先填时薪，再点日历选工作日';
    hintEl.style.color = days > 0 ? 'var(--sage-dk)' : 'var(--muted)';
  }
  if(amtEl && rate > 0 && total > 0) {
    amtEl.value = total;
    updateProfit();
  }
}


let dpY, dpM, dpField;
function openDp(fid) {
  dpField = fid;
  const v = document.getElementById(fid+'-h').value || todayStr();
  const d = new Date(v+'T00:00:00');
  dpY = d.getFullYear(); dpM = d.getMonth();
  renderDp();
  document.getElementById('date-popup').classList.add('open');
}
function closeDp() { document.getElementById('date-popup').classList.remove('open'); }
function renderDp() {
  const CN_M = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('dp-title').textContent = dpY+'年 '+CN_M[dpM];
  const first = new Date(dpY,dpM,1).getDay();
  const days  = new Date(dpY,dpM+1,0).getDate();
  const sel   = document.getElementById(dpField+'-h').value;
  const td    = todayStr();
  let h = '';
  for(let i=0;i<first;i++) h+='<div class="dp-day other-month"></div>';
  for(let d=1;d<=days;d++){
    const ds = dpY+'-'+String(dpM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    h+=`<div class="dp-day ${ds===td?'today':''} ${ds===sel?'selected':''}" onclick="pickDate('${ds}')">${d}</div>`;
  }
  document.getElementById('dp-days').innerHTML = h;
}
function pickDate(ds) {
  document.getElementById(dpField+'-h').value = ds;
  const [y,m,d] = ds.split('-');
  document.getElementById(dpField+'-v').textContent = y+'年'+parseInt(m)+'月'+parseInt(d)+'日';
  closeDp();
  // 触发日期区间提示更新
  if(typeof updateDateRangeHint === 'function') updateDateRangeHint();
}
function dpPrev(){ dpM--; if(dpM<0){dpM=11;dpY--;} renderDp(); }
function dpNext(){ dpM++; if(dpM>11){dpM=0;dpY++;} renderDp(); }
function dpHTML(fid, val) {
  const v = val||todayStr();
  const [y,m,d] = v.split('-');
  return `<input type="hidden" id="${fid}-h" value="${v}">
  <div class="date-display" onclick="openDp('${fid}')">
    <span id="${fid}-v">${y}年${parseInt(m)}月${parseInt(d)}日</span>
    <span style="color:var(--muted);font-size:13px;opacity:.6">▾</span>
  </div>`;
}

// ════════════════════════════════
//  CALCULATOR
// ════════════════════════════════
function cs(id){ if(!calcState[id]) calcState[id]={d:'0',new:true,prev:null,op:null}; return calcState[id]; }
function calcHTML(id) {
  return `<div class="calc-wrap">
  <div class="calc-display-sub" id="cs-${id}"></div>
  <div class="calc-display" id="cd-${id}">0</div>
  <div class="calc-grid">
    <button class="calc-btn clr" onclick="cAC('${id}')">AC</button>
    <button class="calc-btn op" onclick="cOp('${id}','%')">%</button>
    <button class="calc-btn op" onclick="cOp('${id}','±')">±</button>
    <button class="calc-btn op" onclick="cOp('${id}','÷')">÷</button>
    <button class="calc-btn" onclick="cN('${id}','7')">7</button>
    <button class="calc-btn" onclick="cN('${id}','8')">8</button>
    <button class="calc-btn" onclick="cN('${id}','9')">9</button>
    <button class="calc-btn op" onclick="cOp('${id}','×')">×</button>
    <button class="calc-btn" onclick="cN('${id}','4')">4</button>
    <button class="calc-btn" onclick="cN('${id}','5')">5</button>
    <button class="calc-btn" onclick="cN('${id}','6')">6</button>
    <button class="calc-btn op" onclick="cOp('${id}','-')">−</button>
    <button class="calc-btn" onclick="cN('${id}','1')">1</button>
    <button class="calc-btn" onclick="cN('${id}','2')">2</button>
    <button class="calc-btn" onclick="cN('${id}','3')">3</button>
    <button class="calc-btn op" onclick="cOp('${id}','+')">+</button>
    <button class="calc-btn" onclick="cN('${id}','0')" style="grid-column:span 2">0</button>
    <button class="calc-btn" onclick="cN('${id}','.')">.</button>
    <button class="calc-btn eq" onclick="cEq('${id}')">=</button>
  </div>
  <button class="calc-use" onclick="cUse('${id}')">✓ 用此结果填入</button>
</div>`;
}
function cN(id,n){ const s=cs(id); if(s.new){s.d=(n==='.'?'0.':n);s.new=false;}else{if(n==='.'&&s.d.includes('.'))return;s.d=s.d==='0'&&n!=='.'?n:s.d+n;} document.getElementById('cd-'+id).textContent=s.d; }
function cOp(id,op){ const s=cs(id),v=parseFloat(s.d); if(op==='±'){s.d=String(-v);document.getElementById('cd-'+id).textContent=s.d;return;} if(op==='%'){s.d=String(v/100);document.getElementById('cd-'+id).textContent=s.d;return;} if(s.op&&!s.new)cEq(id,true); s.prev=parseFloat(cs(id).d);s.op=op;s.new=true; document.getElementById('cs-'+id).textContent=s.prev+' '+op; }
function cEq(id,int){ const s=cs(id);if(!s.op||s.prev===null)return;const a=s.prev,b=parseFloat(s.d);let r;if(s.op==='+')r=a+b;else if(s.op==='-')r=a-b;else if(s.op==='×')r=a*b;else if(s.op==='÷')r=b?a/b:0;r=Math.round(r*1e8)/1e8;s.d=String(r);if(!int){document.getElementById('cs-'+id).textContent=a+' '+s.op+' '+b+' =';s.op=null;s.prev=null;}s.new=true;document.getElementById('cd-'+id).textContent=r; }
function cAC(id){ calcState[id]={d:'0',new:true,prev:null,op:null};document.getElementById('cd-'+id).textContent='0';document.getElementById('cs-'+id).textContent=''; }
function cUse(id){
  const v = parseFloat(cs(id).d)||0;
  const targets = { 'ex-amount':'ex-amount','ex-fuel':'ex-fuel','ex-repair':'ex-repair','ex-other':'ex-other','ex-partner':'ex-partner','rq-amount':'rq-amount','wt-amount':'wt-amount' };
  const el = document.getElementById(id);
  if(el){ el.value=v; updateProfit(); }
  showToast('已填入 '+fmt(v));
}

// ════════════════════════════════
//  MODULE / SUBTAB
// ════════════════════════════════
function switchModule(m) {
  mod=m; sub='all';
  ['ex','rq','wt'].forEach(x=>document.getElementById('mt-'+x).classList.toggle('active',x===m));
  updateFab(); renderSubTabs(); render();
}
function switchSub(s){ sub=s; renderSubTabs(); render(); }
function renderSubTabs(){
  const el=document.getElementById('sub-tabs');
  const tabs = mod==='ex'
    ? [['all','全部'],['unpaid','未收款'],['summary','按客户']]
    : mod==='rq'
    ? [['all','全部'],['out','送出'],['in','收入'],['summary','汇总']]
    : [['all','全部'],['savings','已存入'],['expense','支出'],['summary','月度汇总']];
  el.innerHTML = tabs.map(([t,l])=>`<div class="sub-tab ${sub===t?'active':''}" onclick="switchSub('${t}')">${l}</div>`).join('');
}

// ════════════════════════════════
//  STATS
// ════════════════════════════════
function renderStats(){
  const el = document.getElementById('stats-row');
  const ph = document.getElementById('profit-hero-bar');
  if(mod==='ex'){
    const total  = db.excavator.reduce((s,r)=>s+r.amount,0);
    const paidAmt= db.excavator.filter(r=>r.paid).reduce((s,r)=>s+r.amount,0);
    const unpaid = total - paidAmt;
    const net    = db.excavator.reduce((s,r)=>s+(r.netProfit||0),0);
    const cost   = db.excavator.reduce((s,r)=>s+(r.totalCost||0),0);
    // 纯利润英雄条（绿色大字）
    if(ph) ph.innerHTML=`<div class="profit-hero">
      <div class="profit-hero-left">到手纯利润<span>工程款扣除全部成本后</span></div>
      <div class="profit-hero-amount"><span class="profit-hero-unit">¥</span>${Number(net||0).toLocaleString('zh-CN')}</div>
    </div>`;
    el.innerHTML=`
      <div class="stat"><div class="stat-val" style="color:var(--sage)">${fmt(total)}</div><div class="stat-label">总工程款</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--blue)">${fmt(paidAmt)}</div><div class="stat-label">已收款</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--danger)">${fmt(unpaid)}</div><div class="stat-label">待收款</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--copper-dk)">${fmt(cost)}</div><div class="stat-label">总成本</div></div>`;
  } else {
    if(ph) ph.innerHTML='';
    if(mod==='rq'){
      const out=db.renqing.filter(r=>r.type==='out').reduce((s,r)=>s+r.amount,0);
      const inn=db.renqing.filter(r=>r.type==='in').reduce((s,r)=>s+r.amount,0);
      const net=inn-out;
      el.innerHTML=`
        <div class="stat"><div class="stat-val" style="color:var(--danger)">${fmt(out)}</div><div class="stat-label">我送出</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--sage)">${fmt(inn)}</div><div class="stat-label">我收入</div></div>
        <div class="stat"><div class="stat-val" style="color:${net>=0?'var(--sage)':'var(--danger)'}">${net>=0?'+':''}${fmt(net)}</div><div class="stat-label">净收支</div></div>`;
    } else {
      const saved = db.wallet.filter(r=>r.type==='savings').reduce((s,r)=>s+r.amount,0);
      const spent = db.wallet.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
      const remain= saved-spent;
      el.innerHTML=`
        <div class="stat"><div class="stat-val" style="color:var(--blue)">${fmt(saved)}</div><div class="stat-label">存入合计</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--copper-dk)">${fmt(spent)}</div><div class="stat-label">家庭支出</div></div>
        <div class="stat"><div class="stat-val" style="color:${remain>=0?'var(--sage)':'var(--danger)'}">${fmt(remain)}</div><div class="stat-label">余粮</div></div>`;
    }
  }
}

// ════════════════════════════════
//  RENDER
// ════════════════════════════════
function render(){
  renderStats();
  const banner = needsBackup()?`<div class="backup-banner"><span>⚠️</span><div class="backup-banner-text">超过7天未备份，数据存在丢失风险</div><button class="backup-banner-btn" onclick="doBackup()">立即备份</button></div>`:'';
  const content = document.getElementById('content');
  if(mod==='ex') renderEx(content, banner);
  else if(mod==='rq') renderRq(content, banner);
  else renderWt(content, banner);
}

// ════════════════════════════════
//  EXCAVATOR
// ════════════════════════════════
function renderEx(content, banner){
  if(sub==='summary'){renderExSum(content,banner);return;}
  let rs = db.excavator;
  if(sub==='unpaid') rs=rs.filter(r=>!r.paid);
  if(!rs.length){ content.innerHTML=banner+`<div class="empty"><div class="empty-icon">🚜</div><p>${sub==='unpaid'?'暂无未收款记录':'暂无工程记录<br>点击下方记一笔'}</p></div>`; return; }
  content.innerHTML=banner+`<div class="search-bar"><span style="color:var(--muted)">◎</span><input placeholder="搜索客户或地点…" oninput="fs(this.value)"></div>`+rs.map(exCard).join('');
}
function exCard(r){
  const pc   = r.paid?'var(--sage)':'var(--danger)';
  const fuel = r.fuel||0, repair=r.repair||0, other=r.other||0, pAmt=r.partnerAmt||0;
  const totalCost = fuel+repair+other+pAmt;
  const net  = r.amount - totalCost;
  const dateStr = fmtDateRange(r.dateStart||r.date, r.dateEnd);
  const modeTag = r.pricingMode==='hourly'
    ? `<span class="tag" style="background:var(--blue-lt);color:var(--blue)">计时</span>`
    : `<span class="tag" style="background:var(--copper-lt);color:var(--copper-dk)">包干</span>`;
  // 计时模式摘要
  let workSubLine = '';
  let workDetailBox = '';
  if(r.pricingMode==='hourly' && r.workDays && typeof r.workDays==='object') {

// ── 日期区间格式化 ──
function fmtDateRange(s, e){
  if(!s) return '—';
  if(!e||e===s) return s;
  // 计算天数
  const days = Math.round((new Date(e)-new Date(s))/864e5)+1;
  const sm=parseInt(s.slice(5,7)), sd=parseInt(s.slice(8));
  const em=parseInt(e.slice(5,7)), ed=parseInt(e.slice(8));
  if(sm===em) return `${s.slice(0,4)}年${sm}月${sd}日—${ed}日（${days}天）`;
  return `${sm}月${sd}日—${em}月${ed}日（${days}天）`;
}

function updateDateRangeHint(){
  const s = document.getElementById('ex-start-h')?.value;
  const e = document.getElementById('ex-end-h')?.value;
  const hint = document.getElementById('date-range-hint');
  if(!hint) return;
  if(s && e && e >= s) hint.textContent = s===e ? '' : fmtDateRange(s, e);
  else if(s && e && e < s) hint.textContent = '⚠️ 完工日期不能早于开工日期';
}

function collectEx(id){
  // 收集表单数据，返回 record 对象（id 可选）
  const client   = document.getElementById('ex-client').value.trim();
  const phone    = document.getElementById('ex-phone').value.trim();
  const location = document.getElementById('ex-location').value.trim();
  const dateStart= document.getElementById('ex-start-h').value;
  const dateEnd  = document.getElementById('ex-end-h').value;
  const amount   = parseFloat(document.getElementById('ex-amount').value)||0;
  const fuel     = parseFloat(document.getElementById('ex-fuel').value)||0;
  const repair   = parseFloat(document.getElementById('ex-repair').value)||0;
  const other    = parseFloat(document.getElementById('ex-other').value)||0;
  const pAmt     = parseFloat(document.getElementById('ex-partner').value)||0;
  const pNote    = document.getElementById('ex-pnote').value.trim();
  const note     = document.getElementById('ex-note').value.trim();
  const hourlyRate = parseFloat(document.getElementById('ex-rate')?.value)||0;
  if(!client)    { alert('请填写客户姓名'); return null; }
  if(!location)  { alert('请填写施工地点'); return null; }
  if(!dateStart) { alert('请选择开工日期'); return null; }
  if(!amount)    { alert('请填写工程金额'); return null; }
  if(dateEnd && dateEnd < dateStart) { alert('完工日期不能早于开工日期'); return null; }
  const totalCost = fuel+repair+other+pAmt;
  const netProfit = amount - totalCost;
  return { client, phone, location,
    dateStart, dateEnd: dateEnd||dateStart, date: dateStart,
    pricingMode: _pricingMode,
    workDays: _pricingMode==='hourly' ? {...wdcDays} : null,
    hourlyRate,
    amount, fuel, repair, other, partnerAmt:pAmt, partnerNote:pNote,
    totalCost, netProfit, paid:_paid, note };
}

function shareRec(id){
  const ex=db.excavator.find(r=>r.id===id);

    const pm = ex.pricingMode==='hourly' ? `计时 ${ex.workDays}天×${ex.hoursPerDay}h×${fmt(ex.hourlyRate)}/h` : '包干总价';
    text=`【工程记录】\n客户：${ex.client}${ex.phone?' ('+ex.phone+')':''}\n地点：${ex.location}\n日期：${ds}\n计价：${pm}\n工程款：${fmt(ex.amount)}\n收款：${ex.paid?'✓已收款':'⏳未收款'}\n纯利润：${fmt(ex.netProfit||0)}${ex.note?'\n备注：'+ex.note:''}\n——工账`;

  else if(wt) text=`【存钱记录】\n${wt.type==='savings'?'存入':'家庭支出'}：${wt.category}\n日期：${wt.date}\n金额：${fmt(wt.amount)}${wt.note?'\n备注：'+wt.note:''}\n——工账`;
  if(!text)return;
  const copy=()=>{ try{ const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.top='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制，打开微信粘贴即可'); }catch(e){showToast('复制失败');} };
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast('已复制，打开微信粘贴即可')).catch(copy);
  else copy();
}

function importData(event){
  const file=event.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.excavator||!d.renqing){alert('文件格式不正确');return;}
      if(!d.wallet)d.wallet=[];
      const n=d.excavator.length+d.renqing.length+d.wallet.length;
      if(!confirm(`读取到 ${n} 条记录，导入后将覆盖当前数据，确认继续？`))return;
      db=d;saveDB();render();showToast('已导入 '+n+' 条记录 ✓');
    }catch(e){alert('导入失败，请选择正确的备份文件');}
    event.target.value='';
  };
  r.readAsText(file,'utf-8');
}


// PWA 启动画面淡出
window.addEventListener('load', () => {
  setTimeout(() => {
    const sp = document.getElementById('splash');
    if(sp){ sp.classList.add('fade'); setTimeout(()=>sp.remove(), 450); }
  }, 600);
  // iOS检测：显示iOS安装提示（仅Safari，未安装状态）
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const dismissed = localStorage.getItem('gz_ios_dismissed');
  if(isIOS && isSafari && !isStandalone && !dismissed) {
    setTimeout(() => {
      const el = document.getElementById('ios-hint');
      if(el) {
        el.style.display = 'block';
        el.querySelector('button').onclick = () => { el.style.display='none'; localStorage.setItem('gz_ios_dismissed','1'); };
      }
    }, 2000);
  }
});

// ════════════════════════════════
//  PWA: Service Worker 注册
// ════════════════════════════════
if ('serviceWorker' in navigator) {
  // 内联 Service Worker（无需外部文件）
  const swCode = `
const CACHE = 'gongzhang-v1';
const FONTS = [
  'https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500&display=swap'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(FONTS).catch(()=>{}))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() =>
      new Response('离线模式', {headers:{'Content-Type':'text/plain;charset=utf-8'}})
    ))
  );
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

//  PWA: 安装提示（安卓）
// ════════════════════════════════
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // 显示安装引导条
  const bar = document.getElementById('install-bar');
  if (bar) bar.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  const bar = document.getElementById('install-bar');
  if (bar) bar.style.display = 'none';
  _deferredPrompt = null;
});
function triggerInstall() {
  if (_deferredPrompt) {
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(() => { _deferredPrompt = null; });
  }
}
function dismissInstall() {
  const bar = document.getElementById('install-bar');
  if (bar) bar.style.display = 'none';
  localStorage.setItem('gz_install_dismissed', '1');
}
